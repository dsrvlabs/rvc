# rvc - Rust Validator Client Configuration
# Copy this file to config.toml and customize as needed.
#
# CLI flags override values set here.
# Run `rvc start -c config.toml` to use this file.

# ---------------------------------------------------------------------------
# Beacon Node
# ---------------------------------------------------------------------------

# Primary beacon node HTTP endpoint (Lighthouse, Prysm, Teku, Nimbus, Lodestar)
beacon_url = "http://141.253.112.63:5052"

# Multi-BN failover: comma-separated list of beacon node URLs.
# When set, takes precedence over beacon_url.
# beacon_nodes = ["http://bn1:5052", "http://bn2:5052", "http://bn3:5052"]

# ---------------------------------------------------------------------------
# Validator Keys
# ---------------------------------------------------------------------------

# Directory containing EIP-2335 keystore JSON files (keystore-*.json)
keystore_path = "./keystores"

# Password file for keystore decryption (optional).
# Format: one `pubkey=password` per line. Lines starting with # are comments.
# A `*=<password>` line sets one default password for every keystore, with
# optional per-validator overrides:
#   *=mySharedPassword
#   0xabcd1234...=differentPassword
# Precedence: exact pubkey entry, else the `*` wildcard, else the keystore is skipped.
# The `*` password decrypts every keystore without its own line, so anyone who
# can read this file holds those keys -- scope it tightly and keep it chmod 600.
# If omitted, passwords are prompted interactively.
# WARNING: Ensure restrictive permissions (chmod 600).
# password_file = "./passwords.txt"

# Block graffiti included in proposed blocks (optional, max 32 bytes)
# graffiti = "rvc"

# ---------------------------------------------------------------------------
# Slashing Protection
# ---------------------------------------------------------------------------

# SQLite database storing attestation/block history to prevent slashing.
# Created automatically on first run.
slashing_db_path = "./slashing_protection.sqlite"

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------

# Network preset: mainnet, hoodi, holesky, sepolia, custom
# Each preset provides genesis_time and genesis_validators_root automatically.
network = "hoodi"

# Genesis overrides (required only when network = "custom")
# genesis_time = 1606824023
# genesis_validators_root = "0x4b363db94e286120d76eb905340fdd4e54bfe9f06bf33ff6cf5ad27f511bfe95"

# ---------------------------------------------------------------------------
# Doppelganger Detection
# ---------------------------------------------------------------------------

# Check for duplicate validators on the network before attesting.
# Monitors for ~2 epochs at startup. Disable with --no-doppelganger-detection CLI flag.
doppelganger_detection = true

# ---------------------------------------------------------------------------
# Servers
# ---------------------------------------------------------------------------

# Prometheus metrics HTTP server (/metrics, /health, /livez, /readyz)
metrics_port = 8080

# gRPC server for duty tracker service
grpc_port = 50051
grpc_address = "127.0.0.1"

# ---------------------------------------------------------------------------
# Keymanager API (runtime key management via Beacon APIs)
# ---------------------------------------------------------------------------

# Enable the Keymanager API server (GET/POST/DELETE /eth/v1/keystores, /eth/v1/remotekeys)
keymanager_enabled = false

# Listen address for the Keymanager API
# keymanager_address = "127.0.0.1:5062"

# Path to the bearer token file (auto-generated if missing)
# keymanager_token_file = "./keymanager-api-token.txt"

# Web3Signer URL for remote signing (used with Keymanager API remote keys)
# remote_signer_url = "https://web3signer:9000"

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

# Log level: trace, debug, info, warn, error
# Can also be set via RUST_LOG environment variable.
log_level = "info"

# ---------------------------------------------------------------------------
# Distributed Tracing (OpenTelemetry)
# ---------------------------------------------------------------------------

# OTLP exporter endpoint. Enables tracing when set.
# Env var fallback: OTEL_EXPORTER_OTLP_ENDPOINT
# tracing_endpoint = "http://localhost:4318"

# Exporter backend: "otlp" (default) or "gcp"
# tracing_exporter = "otlp"

# Head-based sampling ratio 0.0–1.0 (default: 0.01 = 1%).
# Env var fallback: OTEL_TRACES_SAMPLER_ARG (only if this field is at default)
# tracing_sample_rate = 0.01

# Maximum number of spans queued for export (OTel SDK default: 2048).
# tracing_max_queue_size = 2048

# Maximum number of spans per export batch (OTel SDK default: 512).
# tracing_max_export_batch_size = 512

# GCP Cloud Trace: set tracing_exporter = "gcp" (requires --features gcp-trace).
# Uses Application Default Credentials (ADC) — no endpoint needed.
# On shutdown, pending spans are flushed with a 5-second timeout.
