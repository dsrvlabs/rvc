[package]
name = "rvc-signer-bin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "rvc-signer"
path = "src/main.rs"

[features]
default = []
dvt = ["vsss-rs", "bls12_381_plus"]

[dependencies]
async-trait.workspace = true
blst.workspace = true
clap.workspace = true
crypto.workspace = true
hex.workspace = true
prost.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tonic = { workspace = true, features = ["tls"] }
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
zeroize.workspace = true

# DVT (optional)
vsss-rs = { workspace = true, optional = true }
bls12_381_plus = { workspace = true, optional = true }

[dev-dependencies]
rcgen = "0.13"
tempfile.workspace = true
proptest.workspace = true
rand.workspace = true
tokio-stream.workspace = true

# DVT test dependencies (always available in tests when dvt feature is on)
vsss-rs.workspace = true
bls12_381_plus.workspace = true

[build-dependencies]
tonic-build.workspace = true
