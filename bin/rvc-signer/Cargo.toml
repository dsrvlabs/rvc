[package]
name = "rvc-signer-bin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "rvc-signer"
path = "src/main.rs"

[lib]
name = "rvc_signer_bin"
path = "src/lib.rs"

[features]
default = []
dvt = ["vsss-rs", "bls12_381_plus", "rand"]

[dependencies]
async-trait.workspace = true
blst.workspace = true
clap.workspace = true
crypto.workspace = true
eth-types.workspace = true
hex.workspace = true
prost.workspace = true
serde.workspace = true
serde_json.workspace = true
signer.workspace = true
slashing.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-util.workspace = true
toml.workspace = true
tonic = { workspace = true, features = ["tls"] }
# rustls reached via the `tokio_rustls::rustls` re-export so the HTTP transport
# binds the same rustls as the gRPC/tonic stack (single CertificateDer type,
# enforced by 1.5's guard test). Pinned to the versions already in Cargo.lock.
#
# default-features = false is REQUIRED. The rustls `default` set enables the
# `aws_lc_rs` provider feature (and `prefer-post-quantum`, which also pulls it).
# Cargo unifies features across the workspace, so enabling `aws_lc_rs` here would
# turn on BOTH providers on the single shared rustls crate, making automatic
# provider detection ambiguous; `ServerConfig::builder()` would then panic in
# every gRPC mTLS path that builds without an installed default (verified while
# implementing: it broke rvc-grpc-signer integration + rvc-signer-bin dvt tests
# on a --workspace run). We instead match the workspace's existing backend
# (`ring`, pulled by rcgen/quinn/reqwest) and install the ring provider as the
# startup default (see `http_api::tls`). This keeps the shared rustls feature set
# identical to `develop` — zero graph perturbation, zero net-new crates (R1/R4).
# NOTE: deviates from ADR-006's named `aws_lc_rs` provider; see http_api/tls.rs.
rustls = { version = "0.23", default-features = false, features = [
    "ring",
    "logging",
    "std",
    "tls12",
] }
# tokio-rustls's default features ALSO enable `aws_lc_rs` (→ rustls/aws_lc_rs),
# so it gets the same default-features = false + `ring` treatment for the reason
# documented above; otherwise it re-introduces the second provider via unification.
tokio-rustls = { version = "0.26", default-features = false, features = [
    "ring",
    "logging",
    "tls12",
] }
# Web3Signer HTTP API direct deps (R4 version-pinning). Declared in Phase 1 so
# Phases 2/3 start on a single, pinned rustls `CertificateDer` graph. `axum` is
# pinned to "0.7" (NOT the transitive 0.8.8 in the lock) so the HTTP server
# binds the same rustls/pki-types as tonic; rustls is always reached via
# `tokio_rustls::rustls` (see http_api/mod.rs's compile-time guard). All three
# resolve to versions already in Cargo.lock (axum 0.7.9, hyper-util 0.1.20,
# rustls-pemfile 2.2.0) — zero net-new compiled crates. Unused until Phase 2.
axum = "0.7"
hyper-util = "0.1"
rustls-pemfile = "2"
prometheus.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
zeroize.workspace = true

x509-parser.workspace = true

# DVT (optional)
vsss-rs = { workspace = true, optional = true }
bls12_381_plus = { workspace = true, optional = true }
rand = { workspace = true, optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
async-trait.workspace = true
hex.workspace = true
parking_lot.workspace = true
rcgen = "0.13"
tempfile.workspace = true
proptest.workspace = true
rand.workspace = true
tokio-stream.workspace = true
tokio = { workspace = true, features = ["test-util"] }
tracing-test.workspace = true
grpc-signer.workspace = true
crypto.workspace = true
eth-types.workspace = true
slashing.workspace = true

# DVT test dependencies (always available in tests when dvt feature is on)
vsss-rs.workspace = true
bls12_381_plus.workspace = true

# M4 enumeration gate (SS-1, Issue 2.2) — dev-only; must NOT be a production edge
signer-registry.workspace = true

[build-dependencies]
tonic-build.workspace = true
