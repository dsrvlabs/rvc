[package]
name = "rvc-signer-bin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "rvc-signer"
path = "src/main.rs"

[lib]
name = "rvc_signer_bin"
path = "src/lib.rs"

[features]
default = []
dvt = ["vsss-rs", "bls12_381_plus", "rand"]

[dependencies]
async-trait.workspace = true
blst.workspace = true
clap.workspace = true
crypto.workspace = true
eth-types.workspace = true
hex.workspace = true
prost.workspace = true
serde.workspace = true
serde_json.workspace = true
slashing.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-util.workspace = true
toml.workspace = true
tonic = { workspace = true, features = ["tls"] }
prometheus.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
zeroize.workspace = true

x509-parser.workspace = true

# DVT (optional)
vsss-rs = { workspace = true, optional = true }
bls12_381_plus = { workspace = true, optional = true }
rand = { workspace = true, optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
async-trait.workspace = true
hex.workspace = true
parking_lot.workspace = true
rcgen = "0.13"
tempfile.workspace = true
proptest.workspace = true
rand.workspace = true
tokio-stream.workspace = true
tokio = { workspace = true, features = ["test-util"] }
tracing-test.workspace = true
grpc-signer.workspace = true
crypto.workspace = true
eth-types.workspace = true
slashing.workspace = true

# DVT test dependencies (always available in tests when dvt feature is on)
vsss-rs.workspace = true
bls12_381_plus.workspace = true

[build-dependencies]
tonic-build.workspace = true
