[package]
name = "rvc-bin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "rvc"
path = "src/main.rs"

[features]
default = []
gcp-trace = ["telemetry/gcp-trace"]
gcp-secret = ["rvc/gcp-secret", "dep:rustls"]

[dependencies]
beacon.workspace = true
bn-manager.workspace = true
builder.workspace = true
crypto.workspace = true
grpc-signer.workspace = true
eth-types.workspace = true
hex.workspace = true
keymanager-api.workspace = true
metrics.workspace = true
parking_lot.workspace = true
rvc.workspace = true
secret-provider.workspace = true
signer.workspace = true
telemetry.workspace = true
slashing.workspace = true
timing.workspace = true
tokio.workspace = true
tokio-util.workspace = true
clap.workspace = true
tracing.workspace = true
tracing-appender = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
anyhow.workspace = true
tonic.workspace = true
url.workspace = true
rustls = { version = "0.23", optional = true, default-features = false, features = ["ring"] }

[dev-dependencies]
async-trait.workspace = true
beacon.workspace = true
bn-manager.workspace = true
builder.workspace = true
eth-types.workspace = true
hex.workspace = true
rvc.workspace = true
validator-store.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
toml = "0.8"
reqwest = { workspace = true, features = ["blocking"] }
libc = "0.2"
wiremock.workspace = true
serde_json.workspace = true
tokio-util.workspace = true
logroller.workspace = true
tracing.workspace = true
tracing-appender.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
