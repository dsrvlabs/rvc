syntax = "proto3";

package signer;

// SignerService provides remote signing capabilities for Ethereum validators.
service SignerService {
  // Sign produces a BLS signature over the given signing root.
  rpc Sign(SignRequest) returns (SignResponse);

  // ListPublicKeys returns all public keys available for signing.
  rpc ListPublicKeys(ListPublicKeysRequest) returns (ListPublicKeysResponse);

  // GetStatus returns the current status of the signer service.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
}

// SignRequest is the request message for the Sign RPC.
message SignRequest {
  // signing_root is the 32-byte hash to sign.
  bytes signing_root = 1;

  // pubkey is the 48-byte BLS public key identifying which key to sign with.
  bytes pubkey = 2;
}

// SignResponse is the response message for the Sign RPC.
message SignResponse {
  // signature is the 96-byte BLS signature.
  bytes signature = 1;
}

// ListPublicKeysRequest is the request message for the ListPublicKeys RPC.
message ListPublicKeysRequest {}

// ListPublicKeysResponse is the response message for the ListPublicKeys RPC.
message ListPublicKeysResponse {
  // pubkeys is the list of 48-byte BLS public keys available for signing.
  repeated bytes pubkeys = 1;
}

// GetStatusRequest is the request message for the GetStatus RPC.
message GetStatusRequest {}

// GetStatusResponse is the response message for the GetStatus RPC.
message GetStatusResponse {
  // ready indicates whether the signer service is ready to sign.
  bool ready = 1;

  // backend is the name of the signing backend in use.
  string backend = 2;

  // key_count is the number of keys loaded in the signer.
  uint32 key_count = 3;
}

// PeerSignerService provides DVT peer-to-peer partial signature requests.
service PeerSignerService {
  // PartialSign produces a partial BLS signature share for DVT threshold signing.
  rpc PartialSign(PartialSignRequest) returns (PartialSignResponse);
}

// PartialSignRequest is the request message for the PartialSign RPC.
message PartialSignRequest {
  // signing_root is the 32-byte hash to sign.
  bytes signing_root = 1;

  // pubkey is the 48-byte BLS public key identifying which key to sign with.
  bytes pubkey = 2;

  // requester_index is the index of the peer requesting the partial signature.
  uint64 requester_index = 3;
}

// PartialSignResponse is the response message for the PartialSign RPC.
message PartialSignResponse {
  // partial_signature is the 96-byte BLS partial signature share.
  bytes partial_signature = 1;

  // share_index is the index of the share that produced the partial signature.
  uint64 share_index = 2;
}
